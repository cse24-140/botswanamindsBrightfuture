<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing - Botswana Minds, Bright Future | IGCSE & BGCSE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0e1a 0%, #0f1622 50%, #1a0f2e 100%); color: #ffffff; min-height: 100vh; }
        .navbar { position: fixed; top: 0; left: 0; right: 0; background: rgba(10, 14, 26, 0.95); backdrop-filter: blur(15px); padding: 1rem 5%; z-index: 1000; border-bottom: 1px solid rgba(0, 229, 255, 0.2); }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #00e5ff, #0077ff); border-radius: 50%; box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); display: flex; align-items: center; justify-content: center; }
        .logo-icon i { font-size: 1.5rem; color: #fff; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .logo:hover .logo-icon i { animation: spin 2s linear infinite; }
        .logo h1 { font-size: 1.1rem; font-weight: 700; background: linear-gradient(135deg, #00e5ff, #0077ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { font-size: 0.7rem; color: #ffffff; }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: #b8c7e7; text-decoration: none; transition: 0.3s; font-weight: 500; position: relative; }
        .nav-links a:hover, .nav-links a.active { color: #00e5ff; }        .nav-links a::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 50%; transform: translateX(-50%); background: #00e5ff; transition: width 0.3s ease; }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .curriculum-switcher { display: flex; gap: 0.5rem; background: rgba(18, 25, 45, 0.8); border-radius: 40px; padding: 0.2rem; border: 1px solid rgba(0, 229, 255, 0.3); }
        .curriculum-btn { padding: 0.4rem 1.2rem; border-radius: 40px; border: none; background: transparent; color: #b8c7e7; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
        .curriculum-btn.active { background: linear-gradient(135deg, #00e5ff, #0077ff); color: white; }
        .user-badge { display: flex; align-items: center; gap: 0.8rem; background: rgba(0, 229, 255, 0.1); padding: 0.4rem 1rem; border-radius: 40px; cursor: pointer; }
        .user-badge i { color: #00e5ff; }
        .main-content { padding-top: 90px; max-width: 1400px; margin: 0 auto; padding-left: 2rem; padding-right: 2rem; padding-bottom: 3rem; }
        .page-header { text-align: center; margin-bottom: 3rem; }
        .page-header h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .page-header p { color: #a0b4d0; max-width: 600px; margin: 0 auto; }
        .curriculum-badge { display: inline-block; background: rgba(0, 229, 255, 0.15); padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.8rem; color: #00e5ff; margin-bottom: 1rem; }
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
        .pricing-card { background: rgba(18, 25, 45, 0.7); backdrop-filter: blur(10px); border-radius: 32px; padding: 2rem; text-align: center; border: 1px solid rgba(0, 229, 255, 0.15); transition: 0.3s; position: relative; }
        .pricing-card.popular { border: 2px solid #00e5ff; transform: scale(1.02); }
        .popular-badge { position: absolute; top: -12px; right: 20px; background: linear-gradient(135deg, #00e5ff, #0077ff); padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.7rem; }
        .price { margin: 1rem 0; }
        .amount { font-size: 3rem; font-weight: 800; }
        .features { list-style: none; margin: 1.5rem 0; text-align: left; }
        .features li { padding: 0.5rem 0; color: #b8c7e7; }
        .features li i { color: #00e5ff; margin-right: 0.5rem; }
        .subscribe-btn { background: linear-gradient(135deg, #00e5ff, #0077ff); border: none; padding: 1rem; width: 100%; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .subscribe-btn:hover { transform: scale(1.02); }
        .billing-toggle { display: flex; justify-content: center; align-items: center; gap: 1rem; margin-bottom: 2rem; }
        .toggle-switch { width: 60px; height: 30px; background: rgba(18, 25, 45, 0.8); border-radius: 30px; cursor: pointer; position: relative; border: 1px solid rgba(0, 229, 255, 0.3); }
        .toggle-slider { width: 26px; height: 26px; background: linear-gradient(135deg, #00e5ff, #0077ff); border-radius: 50%; position: absolute; top: 2px; left: 3px; transition: 0.3s; }
        .toggle-switch.annual .toggle-slider { left: 31px; }
        .save-badge { background: #00e5ff20; color: #00e5ff; padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.7rem; }
        .faq-section { margin-top: 3rem; }
        .faq-section h2 { text-align: center; margin-bottom: 2rem; }
        .faq-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1rem; }
        .faq-item { background: rgba(18, 25, 45, 0.5); border-radius: 16px; padding: 1rem; cursor: pointer; }
        .faq-question { display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .faq-answer { max-height: 0; overflow: hidden; transition: 0.3s; color: #a0b4d0; font-size: 0.85rem; }
        .faq-item.open .faq-answer { max-height: 100px; margin-top: 0.5rem; }
        .footer { text-align: center; padding: 2rem; color: #6c86a3; font-size: 0.8rem; border-top: 1px solid rgba(0, 229, 255, 0.1); margin-top: 2rem; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1a2a3a; padding: 1rem 1.5rem; border-radius: 12px; border-left: 4px solid #00e5ff; z-index: 1000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 900px) { .nav-links { display: none; } .pricing-grid { grid-template-columns: 1fr; } .faq-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-lightbulb"></i></div>
                <div><h1>Botswana Minds, Bright Future</h1><p>Smart Learning for BGCSE & IGCSE</p></div>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="courses.html">Courses</a>
                <a href="resources.html">Resources</a>
                <a href="pricing.html" class="active">Pricing</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="curriculum-switcher">
                <button class="curriculum-btn" data-curriculum="igcse" onclick="setCurriculum('igcse')">IGCSE</button>
                <button class="curriculum-btn" data-curriculum="bgcse" onclick="setCurriculum('bgcse')">BGCSE</button>
            </div>
            <div class="user-badge" onclick="showAuthModal()">
                <i class="fas fa-user-circle"></i> <span id="userNameDisplay">Account</span>
            </div>
        </div>
    </nav>

    <div class="main-content" id="mainContent"></div>
    <div class="footer"><p>© 2024 Botswana Minds, Bright Future. Empowering IGCSE & BGCSE Students Worldwide.</p></div>

    <script>
        let currentCurriculum = localStorage.getItem('selectedCurriculum') || 'igcse';
        let isAnnual = false;

        const plans = [
            { name: "Basic", monthly: 99, yearly: 830, features: ["5 Subjects", "Basic Flashcards", "Download Notes", "Email Support", "Community Access"] },
            { name: "Pro", monthly: 199, yearly: 1670, features: ["All Subjects", "Advanced Flashcards", "Download All Resources", "Priority Support", "Mock Exams", "Progress Tracking", "Certificate"], popular: true },
            { name: "Tutor", monthly: 499, yearly: 4190, features: ["Everything in Pro", "1-on-1 Tutoring", "Homework Help", "24/7 Support", "Parent Dashboard", "Custom Study Plan"] }
        ];

        function setCurriculum(curriculum) {
            currentCurriculum = curriculum;
            localStorage.setItem('selectedCurriculum', curriculum);
            document.querySelectorAll('.curriculum-btn').forEach(btn => {
                if (btn.getAttribute('data-curriculum') === curriculum) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            showToast(`Switched to ${curriculum.toUpperCase()} curriculum`);
            renderPricing();
        }

        function toggleBilling() {
            isAnnual = !isAnnual;
            document.getElementById('billingToggle')?.classList.toggle('annual');
            renderPricing();
        }

        function toggleFaq(element) {
            element.classList.toggle('open');
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = isError ? '#ff4655' : '#00e5ff';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}" style="margin-right: 10px;"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showAuthModal() {
            const user = localStorage.getItem('solace_currentUser');
            if (user) { 
                if (confirm('Logout?')) {
                    localStorage.removeItem('botswanaminds_currentUser');
                    document.getElementById('userNameDisplay').innerText = 'Account'; 
                    showToast('Logged out');
                }
                return;
            }
            const action = prompt('Enter 1 to Login, 2 to Create Account');
            if (action === '1') {
                const username = prompt('Username:');
                const password = prompt('Password:');
                const users = JSON.parse(localStorage.getItem('solace_users') || '[]');
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    const session = { username: user.username, fullname: user.fullname, role: user.role || 'student' };
                    localStorage.setItem('botswanaminds_currentUser', JSON.stringify(session));
                    localStorage.setItem('solace_currentUser', JSON.stringify(session));
                    document.getElementById('userNameDisplay').innerText = user.fullname || user.username;
                    showToast(`Welcome back!`);
                } else showToast('Invalid credentials', true);
            } else if (action === '2') {
                const fullname = prompt('Full Name:');
                const username = prompt('Username:');
                const email = prompt('Email:');
                const password = prompt('Password (min 6 chars):');
                const roleChoice = prompt('Register as: 1 for Student, 2 for Tutor');
                const role = roleChoice === '2' ? 'tutor' : 'student';
                
                if (fullname && username && email && password && password.length >= 6) {
                    const users = JSON.parse(localStorage.getItem('solace_users') || '[]');
                    if (users.some(u => u.username === username)) { showToast('Username taken', true); return; }
                    const newUser = { fullname, username, email, password, role };
                    users.push(newUser);
                    localStorage.setItem('solace_users', JSON.stringify(users));
                    localStorage.setItem('botswanaminds_currentUser', JSON.stringify({ username, fullname, role }));
                    localStorage.setItem('solace_currentUser', JSON.stringify({ username, fullname, role }));
                    document.getElementById('userNameDisplay').innerText = fullname;
                    showToast(`Welcome ${fullname}! Registered as ${role}.`);
                } else showToast('Invalid input', true);
            }
        }

        function subscribePlan(planName) {
            showToast(`You selected the ${planName} plan for ${currentCurriculum.toUpperCase()}! Redirecting to checkout...`);
        }

        function renderPricing() {
            document.getElementById('mainContent').innerHTML = `
                <div class="page-header">
                    <div class="curriculum-badge">💰 ${currentCurriculum.toUpperCase()} Pricing</div>
                    <h1>Simple, Transparent Pricing</h1>
                    <p>Choose the plan that works best for you. All plans include full access to ${currentCurriculum.toUpperCase()} library.</p>
                </div>
                <div class="billing-toggle">
                    <span>Monthly</span>
                    <div class="toggle-switch ${isAnnual ? 'annual' : ''}" id="billingToggle" onclick="toggleBilling()">
                        <div class="toggle-slider"></div>
                    </div>
                    <span>Yearly <span class="save-badge">Save 30%</span></span>
                </div>
                <div class="pricing-grid">
                    ${plans.map(plan => `
                        <div class="pricing-card ${plan.popular ? 'popular' : ''}">
                            ${plan.popular ? '<div class="popular-badge">🔥 Most Popular</div>' : ''}
                            <div class="plan-name">${plan.name}</div>
                            <div class="price">
                                <span class="currency">P</span>
                                <span class="amount">${isAnnual ? plan.yearly : plan.monthly}</span>
                                <span class="period">/${isAnnual ? 'year' : 'month'}</span>
                            </div>
                            <ul class="features">
                                ${plan.features.map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}
                            </ul>
                            <button class="subscribe-btn" onclick="subscribePlan('${plan.name}')">Get Started →</button>
                        </div>
                    `).join('')}
                </div>
                <div class="faq-section">
                    <h2>❓ Frequently Asked Questions</h2>
                    <div class="faq-grid">
                        <div class="faq-item" onclick="toggleFaq(this)">
                            <div class="faq-question">Can I cancel anytime? <i class="fas fa-chevron-down"></i></div>
                            <div class="faq-answer">Yes! You can cancel your subscription at any time. No questions asked.</div>
                        </div>
                        <div class="faq-item" onclick="toggleFaq(this)">
                            <div class="faq-question">Do you offer student discounts? <i class="fas fa-chevron-down"></i></div>
                            <div class="faq-answer">Yes! Students get 20% off with a valid school email address.</div>
                        </div>
                        <div class="faq-item" onclick="toggleFaq(this)">
                            <div class="faq-question">Is there a free trial? <i class="fas fa-chevron-down"></i></div>
                            <div class="faq-answer">Yes! All plans come with a 7-day free trial. No credit card required.</div>
                        </div>
                        <div class="faq-item" onclick="toggleFaq(this)">
                            <div class="faq-question">What payment methods do you accept? <i class="fas fa-chevron-down"></i></div>
                            <div class="faq-answer">We accept Visa, Mastercard, PayPal, Mobile Money, and bank transfer.</div>
                        </div>
                    </div>
                </div>
            `;
        }

        document.querySelectorAll('.curriculum-btn').forEach(btn => {
            if (btn.getAttribute('data-curriculum') === currentCurriculum) btn.classList.add('active');
        });
        const savedUser = localStorage.getItem('solace_currentUser');
        if (savedUser) document.getElementById('userNameDisplay').innerText = JSON.parse(savedUser).fullname || JSON.parse(savedUser).username;
        renderPricing();
    </script>
</body>
</html>
