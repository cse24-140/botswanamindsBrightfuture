<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Botswana Minds, Bright Future | IGCSE & BGCSE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1622 50%, #1a0f2e 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(15px);
            padding: 1rem 5%;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 1.5rem;
            color: #fff;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo:hover .logo-icon i {
            animation: spin 2s linear infinite;
        }

        .logo h1 {
            font-size: 1.1rem;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.7rem;
            color: #ffffff;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: #b8c7e7;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
            cursor: pointer;
            position: relative;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #00e5ff;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            background: #00e5ff;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }

        /* Curriculum Switcher */
        .curriculum-switcher {
            display: flex;
            gap: 0.5rem;
            background: rgba(18, 25, 45, 0.8);
            border-radius: 40px;
            padding: 0.2rem;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        .curriculum-btn {
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: none;
            background: transparent;
            color: #b8c7e7;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .curriculum-btn.active {
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            color: white;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(0, 229, 255, 0.1);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
        }

        .user-badge i {
            color: #00e5ff;
        }

        /* Main Content */
        .main-content {
            padding-top: 90px;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 2rem;
            padding-right: 2rem;
            padding-bottom: 3rem;
        }

        /* Page Header */
        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .page-header p {
            color: #a0b4d0;
            max-width: 600px;
            margin: 0 auto;
        }

        .curriculum-badge {
            display: inline-block;
            background: rgba(0, 229, 255, 0.15);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #00e5ff;
            margin-bottom: 1rem;
        }

        /* Contact Grid */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        .info-card, .contact-form {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(0, 229, 255, 0.15);
            transition: 0.3s;
        }

        .info-card:hover, .contact-form:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 229, 255, 0.4);
        }

        .info-card h2 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            transition: 0.3s;
        }

        .contact-item:hover {
            background: rgba(0, 229, 255, 0.08);
            transform: translateX(5px);
        }

        .contact-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00e5ff20, #0077ff20);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-icon i {
            font-size: 1.3rem;
            color: #00e5ff;
        }

        .contact-details h4 {
            margin-bottom: 0.2rem;
        }

        .contact-details p {
            color: #a0b4d0;
            font-size: 0.85rem;
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .social-icon:hover {
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            transform: translateY(-3px);
        }

        .social-icon i {
            font-size: 1.3rem;
        }

        .office-hours {
            margin-top: 2rem;
            background: rgba(0, 229, 255, 0.05);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
        }

        .office-hours h4 {
            color: #00e5ff;
            margin-bottom: 0.5rem;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #00e5ff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }

        .submit-btn {
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 229, 255, 0.3);
        }

        /* Map Container */
        .map-container {
            margin-top: 3rem;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .map-placeholder {
            background: linear-gradient(135deg, #0a0f1a, #12192c);
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }

        .map-placeholder i {
            font-size: 3rem;
            color: #00e5ff;
        }

        .map-placeholder p {
            color: #a0b4d0;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: #6c86a3;
            font-size: 0.8rem;
            border-top: 1px solid rgba(0, 229, 255, 0.1);
            margin-top: 2rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a2a3a;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border-left: 4px solid #00e5ff;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .nav-links {
                display: none;
            }
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-lightbulb"></i></div>
                <div>
                    <h1>Botswana Minds, Bright Future</h1>
                    <p>Smart Learning for BGCSE & IGCSE</p>
                </div>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="courses.html">Courses</a>
                <a href="resources.html">Resources</a>
                <a href="pricing.html">Pricing</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
            <div class="curriculum-switcher">
                <button class="curriculum-btn" data-curriculum="igcse" onclick="setCurriculum('igcse')">IGCSE</button>
                <button class="curriculum-btn" data-curriculum="bgcse" onclick="setCurriculum('bgcse')">BGCSE</button>
            </div>
            <div class="user-badge" onclick="showAuthModal()">
                <i class="fas fa-user-circle"></i> <span id="userNameDisplay">Account</span>
            </div>
        </div>
    </nav>

    <div class="main-content" id="mainContent"></div>

    <div class="footer">
        <p>© 2024 Botswana Minds, Bright Future. Empowering IGCSE & BGCSE Students Worldwide.</p>
    </div>

    <script>
        let currentCurriculum = localStorage.getItem('selectedCurriculum') || 'igcse';
        let currentUser = null;

        function setCurriculum(curriculum) {
            currentCurriculum = curriculum;
            localStorage.setItem('selectedCurriculum', curriculum);
            document.querySelectorAll('.curriculum-btn').forEach(btn => {
                if (btn.getAttribute('data-curriculum') === curriculum) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            showToast(`Switched to ${curriculum.toUpperCase()} curriculum`);
            renderContact();
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = isError ? '#ff4655' : '#00e5ff';
            toast.innerHTML = `
                <i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}" style="margin-right: 10px;"></i>
                ${message}
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Auth functions
        function getUsers() {
            return JSON.parse(localStorage.getItem('solace_users') || '[]');
        }

        function saveUsers(users) {
            localStorage.setItem('solace_users', JSON.stringify(users));
        }

        function updateAuthUI() {
            const user = localStorage.getItem('solace_currentUser');
            if (user) {
                currentUser = JSON.parse(user);
                document.getElementById('userNameDisplay').innerText = currentUser.fullname || currentUser.username;
            } else {
                currentUser = null;
                document.getElementById('userNameDisplay').innerText = 'Account';
            }
        }

        function showAuthModal() {
            if (currentUser) {
                if (confirm('Logout from Botswana Minds, Bright Futures?')) {
                    localStorage.removeItem('botswanaminds_currentUser');
                    currentUser = null;
                    updateAuthUI();
                    showToast('Logged out successfully');
                    renderContact();
                }
            }
            const action = prompt('Enter 1 to Login, 2 to Create Account');
            if (action === '1') {
                const username = prompt('Username:');
                const password = prompt('Password:');
                const users = getUsers();
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    const session = { username: user.username, fullname: user.fullname, role: user.role || 'student' };
                    localStorage.setItem('botswanaminds_currentUser', JSON.stringify(session));
                    localStorage.setItem('solace_currentUser', JSON.stringify(session));
                    updateAuthUI();
                    showToast(`Welcome back, ${user.fullname || username}!`);
                } else {
                    showToast('Invalid credentials', true);
                }
            } else if (action === '2') {
                const fullname = prompt('Full Name:');
                const username = prompt('Username:');
                const email = prompt('Email:');
                const password = prompt('Password (min 6 chars):');
                const roleChoice = prompt('Register as: 1 for Student, 2 for Tutor');
                const role = roleChoice === '2' ? 'tutor' : 'student';
                
                if (fullname && username && email && password && password.length >= 6) {
                    const users = getUsers();
                    if (users.some(u => u.username === username)) {
                        showToast('Username taken', true);
                        return;
                    }
                    const newUser = { fullname, username, email, password, role };
                    users.push(newUser);
                    saveUsers(users);
                    localStorage.setItem('botswanaminds_currentUser', JSON.stringify({ username, fullname, role }));
                    localStorage.setItem('solace_currentUser', JSON.stringify({ username, fullname, role }));
                    updateAuthUI();
                    showToast(`Welcome ${fullname}! Account created as ${role}.`);
                } else {
                    showToast('Invalid input or password too short', true);
                }
            }
        }

        function sendMessage(event) {
            event.preventDefault();
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            if (name && email && subject && message) {
                showToast(`Thank you ${name}! Your message has been sent successfully. We'll get back to you within 24 hours.`);
                document.getElementById('contactForm').reset();
            } else {
                showToast('Please fill in all required fields', true);
            }
        }

        function renderContact() {
            document.getElementById('mainContent').innerHTML = `
                <div class="page-header">
                    <div class="curriculum-badge">📬 ${currentCurriculum.toUpperCase()} Support</div>
                    <h1>Get in Touch</h1>
                    <p>Have questions about ${currentCurriculum.toUpperCase()}? We'd love to hear from you. Send us a message and we'll respond within 24 hours.</p>
                </div>

                <div class="contact-grid">
                    <!-- Left: Contact Info -->
                    <div class="info-card">
                        <h2><i class="fas fa-address-card" style="color: #00e5ff; margin-right: 10px;"></i> Contact Information</h2>
                        
                        <div class="contact-item">
                            <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
                            <div class="contact-details">
                                <h4>Our Location</h4>
                                <p>Gaborone, Botswana</p>
                            </div>
                        </div>
                        
                        <div class="contact-item">
                            <div class="contact-icon"><i class="fas fa-phone-alt"></i></div>
                            <div class="contact-details">
                                <h4>Phone Number</h4>
                                <p>+267 72984155</p>
                            </div>
                        </div>
                        
                        <div class="contact-item">
                            <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                            <div class="contact-details">
                                <h4>Email Address</h4>
                                <p>botswanamindsbrightfuture@gmail.com</p>
                            </div>
                        </div>
                        
                        <div class="contact-item">
                            <div class="contact-icon"><i class="fab fa-whatsapp"></i></div>
                            <div class="contact-details">
                                <h4>WhatsApp Support</h4>
                                <p>+267 72984155</p>
                            </div>
                        </div>

                        <div class="office-hours">
                            <h4><i class="fas fa-clock"></i> Support Hours</h4>
                            <p>Monday - Friday: 8:00 AM - 8:00 PM</p>
                            <p>Saturday: 9:00 AM - 5:00 PM</p>
                            <p>Sunday: Closed</p>
                        </div>

                        <div class="social-links">
                            <div class="social-icon" onclick="window.open('https://facebook.com', '_blank')"><i class="fab fa-facebook-f"></i></div>
                            <div class="social-icon" onclick="window.open('https://twitter.com', '_blank')"><i class="fab fa-twitter"></i></div>
                            <div class="social-icon" onclick="window.open('https://instagram.com', '_blank')"><i class="fab fa-instagram"></i></div>
                            <div class="social-icon" onclick="window.open('https://linkedin.com', '_blank')"><i class="fab fa-linkedin-in"></i></div>
                            <div class="social-icon" onclick="window.open('https://youtube.com', '_blank')"><i class="fab fa-youtube"></i></div>
                            <div class="social-icon" onclick="window.open('https://tiktok.com', '_blank')"><i class="fab fa-tiktok"></i></div>
                        </div>
                    </div>

                    <!-- Right: Contact Form -->
                    <div class="contact-form">
                        <h2><i class="fas fa-paper-plane" style="color: #00e5ff; margin-right: 10px;"></i> Send us a Message</h2>
                        <form id="contactForm" onsubmit="sendMessage(event)">
                            <div class="form-group">
                                <label>Full Name *</label>
                                <input type="text" id="fullName" placeholder="Enter your full name" required>
                            </div>
                            
                            <div class="form-group">
                                <label>Email Address *</label>
                                <input type="email" id="email" placeholder="your@email.com" required>
                            </div>
                            
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" id="phone" placeholder="+267 72984155">
                            </div>
                            
                            <div class="form-group">
                                <label>Subject *</label>
                                <select id="subject" required>
                                    <option value="">Select a subject...</option>
                                    <option>${currentCurriculum.toUpperCase()} General Inquiry</option>
                                    <option>${currentCurriculum.toUpperCase()} Course Support</option>
                                    <option>Technical Issue</option>
                                    <option>Partnership Opportunity</option>
                                    <option>Billing Question</option>
                                    <option>Feedback/Suggestion</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Message *</label>
                                <textarea id="message" rows="4" placeholder="How can we help you with ${currentCurriculum.toUpperCase()}?" required></textarea>
                            </div>
                            
                            <button type="submit" class="submit-btn">
                                <i class="fas fa-paper-plane"></i> Send Message
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Map -->
                <div class="map-container">
                    <div class="map-placeholder">
                        <i class="fas fa-map-marked-alt"></i>
                        <p>📍 Gaborone, Botswana - Find our office here</p>
                        <p style="font-size: 0.8rem; color: #6c86a3;">Serving ${currentCurriculum.toUpperCase()} students across Botswana</p>
                    </div>
                </div>
            `;
        }

        // Initialize
        document.querySelectorAll('.curriculum-btn').forEach(btn => {
            if (btn.getAttribute('data-curriculum') === currentCurriculum) {
                btn.classList.add('active');
            }
        });
        updateAuthUI();
        renderContact();
    </script>
</body>
</html>
