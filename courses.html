    <script>
        let currentCurriculum = localStorage.getItem('selectedCurriculum') || 'igcse';
        let currentUser = null;
        let currentCategory = 'all';

        // Auth functions
        function getUsers() {
            const users1 = JSON.parse(localStorage.getItem('botswanaminds_users') || '[]');
            const users2 = JSON.parse(localStorage.getItem('solace_users') || '[]');
            return users1.length >= users2.length ? users1 : users2;
        }

        function showAuthModal() {
            const user = localStorage.getItem('botswanaminds_currentUser') || localStorage.getItem('solace_currentUser');
            if (user) { 
                if (confirm('Logout?')) {
                    localStorage.removeItem('botswanaminds_currentUser');
                    localStorage.removeItem('solace_currentUser');
                    document.getElementById('userNameDisplay').innerText = 'Account'; 
                    showToast('Logged out');
                }
                return;
            }
            const action = prompt('Enter 1 to Login, 2 to Create Account');
            if (action === '1') {
                const username = prompt('Username:');
                const password = prompt('Password:');
                const users = getUsers();
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    const session = { username: user.username, fullname: user.fullname, role: user.role || 'student' };
                    localStorage.setItem('botswanaminds_currentUser', JSON.stringify(session));
                    localStorage.setItem('solace_currentUser', JSON.stringify(session));
                    document.getElementById('userNameDisplay').innerText = user.fullname || user.username;
                    showToast(`Welcome back!`);
                } else showToast('Invalid credentials', true);
            } else if (action === '2') {
                const fullname = prompt('Full Name:');
                const username = prompt('Username:');
                const email = prompt('Email:');
                const password = prompt('Password (min 6 chars):');
                const roleChoice = prompt('Register as: 1 for Student, 2 for Tutor');
                const role = roleChoice === '2' ? 'tutor' : 'student';
                
                if (fullname && username && email && password && password.length >= 6) {
                    const users = getUsers();
                    if (users.some(u => u.username === username)) { showToast('Username taken', true); return; }
                    const newUser = { fullname, username, email, password, role };
                    users.push(newUser);
                    localStorage.setItem('solace_users', JSON.stringify(users));
                    localStorage.setItem('botswanaminds_users', JSON.stringify(users));
                    localStorage.setItem('solace_currentUser', JSON.stringify({ username, fullname, role }));
                    localStorage.setItem('botswanaminds_currentUser', JSON.stringify({ username, fullname, role }));
                    document.getElementById('userNameDisplay').innerText = fullname;

                                { q: "Three main types of rocks", a: "Igneous, sedimentary, metamorphic" },

                        },

                            ]

                        {

                            notes: "Rainforest, savanna, desert, tundra, temperate forests. Biodiversity, food chains, and ecological balance.",
                            questions: [
                                { q: "Largest biome on Earth", a: "Taiga/boreal forest" },
                                { q: "Biome with highest biodiversity", a: "Rainforest/tropical forest" },
                                { q: "Kalahari is an example of __ biome", a: "Desert" }

                        {

                                { q: "Movement of people from rural to urban areas", a: "Urbanization" },
                                { q: "Factors affecting population growth", a: "Birth rate, death rate, migration" }
                            ]
                        },
                        {
                            title: "Economic Geography",
                            notes: "Agriculture, mining, industry, tourism, trade, economic development, and resource management.",
                            questions: [
                                { q: "Primary sector of economy involves __", a: "Extracting natural resources (mining, farming)" },
                                { q: "Botswana's main economic sector", a: "Diamond mining" },
                                { q: "Sustainable tourism benefits local communities by __", a: "Creating jobs and income" }
                            ]
                        },
                        {
                            title: "Environmental Issues & Sustainability",
                            notes: "Climate change, deforestation, desertification, water scarcity, pollution, and conservation efforts.",
                            questions: [
                                { q: "Process where desert expands into fertile land", a: "Desertification" },
                                { q: "Main cause of climate change", a: "Greenhouse gas emissions" },
                                { q: "Renewable resource vs non-renewable", a: "Renewable: water, sunlight; Non-renewable: fossil fuels, minerals" }
                            ]
                        }
                    ]
                },
                history: {
                    name: "History (BGCSE)",
                    code: "BGCSE",
                    icon: "fa-scroll",
                    description: "Explore Botswana, African, and world history",
                    objectives: [
                        "Understand Botswana's pre-colonial and colonial history",
                        "Study independence and post-independence development",
                        "Analyze major historical events and their impact",
                        "Examine cause and effect in historical events"
                    ],
                    topics: [
                        {
                            title: "Pre-Colonial Botswana & Traditional Societies",
                            notes: "San/Bushmen, Bantu migrations, Tswana kingdoms, Khoi pastoralists, traditional governance, and cultural practices.",
                            questions: [
                                { q: "Original inhabitants of Botswana", a: "San people (Bushmen)" },
                                { q: "Language spoken by Tswana people", a: "Setswana" },
                                { q: "Traditional Tswana leader was called __", a: "Kgosi (chief)" }
                            ]
                        },
                        {
                            title: "Colonial Period & European Influence",
                            notes: "British colonization, Bechuanaland Protectorate, colonial administration, land dispossession, and resistance.",
                            questions: [
                                { q: "Botswana was formerly called __", a: "Bechuanaland Protectorate" },
                                { q: "Year British established protectorate over Bechuanaland", a: "1885" },
                                { q: "Purpose of colonial rule", a: "Control resources, trade, and territory" }
                            ]
                        },
                        {
                            title: "Independence & Nation Building (1966-1980s)",
                            notes: "Independence movement, first president Seretse Khama, democratic transition, economic development, and nation-building.",
                            questions: [
                                { q: "Date of Botswana's independence", a: "September 30, 1966" },
                                { q: "First President of independent Botswana", a: "Seretse Khama" },
                                { q: "Botswana's independence was __", a: "Peaceful (no violent revolution)" }
                            ]
                        },
                        {
                            title: "Economic Development & Diamond Era",
                            notes: "Discovery of diamonds, economic growth, diversification efforts, investment in education and infrastructure.",
                            questions: [
                                { q: "Major discovery that transformed Botswana's economy", a: "Diamonds (1967)" },
                                { q: "First large diamond mine in Botswana", a: "Orapa" },
                                { q: "Botswana's economic model is called __", a: "Controlled capitalism" }
                            ]
                        },
                        {
                            title: "Government & Democracy",
                            notes: "Democratic system, parliamentary government, multi-party democracy, elections, rule of law, and constitution.",
                            questions: [
                                { q: "Botswana's government system", a: "Parliamentary democracy" },
                                { q: "Number of terms a President can serve", a: "Two terms (10 years)" },
                                { q: "Legislative branch of Botswana government", a: "National Assembly" }
                            ]
                        },
                        {
                            title: "Contemporary Botswana & Regional Context",
                            notes: "Modern challenges (HIV/AIDS), regional integration (SADC), international relations, and future prospects.",
                            questions: [
                                { q: "Major health challenge in Botswana", a: "HIV/AIDS" },
                                { q: "Regional organization Botswana belongs to", a: "SADC (Southern African Development Community)" },
                                { q: "Botswana's relationship with South Africa and Zimbabwe", a: "Regional cooperation and trade" }
                            ]
                        }
                    ]
                }
            }
        };

        function setCurriculum(curriculum) {
            currentCurriculum = curriculum;
            localStorage.setItem('selectedCurriculum', curriculum);
            document.querySelectorAll('.curriculum-btn').forEach(btn => {
                if (btn.getAttribute('data-curriculum') === curriculum) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            showToast(`Switched to ${curriculum.toUpperCase()} curriculum`);
            renderCourses();
        }

        function showCourseDetail(courseKey) {
            selectedCourse = courseKey;
            const courseData = coursesData[currentCurriculum][courseKey];
            const html = `
                <button class="back-btn" onclick="selectedCourse=null; renderCourses()"><i class="fas fa-arrow-left"></i> Back to Courses</button>
                <div class="course-detail-header">
                    <h1><i class="fas ${courseData.icon}"></i> ${courseData.name}</h1>
                    <p>${courseData.description}</p>
                </div>

                <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                    <button class="submit-btn" style="flex: 1; border-radius: 30px;" onclick="startTimedExam('${courseKey}')">
                        <i class="fas fa-stopwatch"></i> Start Full Mock Exam (30 Mins)
                    </button>
                    <button class="enroll-btn" style="flex: 1; border-radius: 30px; text-align: center;" onclick="showToast('Course content downloaded for offline study')">
                        <i class="fas fa-download"></i> Download Study Guide
                    </button>
                    <button class="enroll-btn" style="flex: 1; border-radius: 30px; text-align: center;" onclick="saveToLibrary('${courseData.name} Study Guide', 'notes')">
                        <i class="fas fa-bookmark"></i> Save to My Cloud
                    </button>
                </div>
                
                <div class="objectives">
                    <h3>📋 Learning Objectives</h3>
                    <ul>
                        ${courseData.objectives.map(obj => `<li>${obj}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="topics-container">
                    <h3 style="color: #00e5ff; margin-bottom: 1rem;">📚 Course Topics & Content</h3>
                    ${courseData.topics.map((topic, idx) => `
                        <div class="topic-card">
                            <div class="topic-header" onclick="toggleTopic(${idx})">
                                <h4>${topic.title}</h4>
                                <i class="fas fa-chevron-down" id="toggle-${idx}" style="transition: 0.3s;"></i>
                            </div>
                            <div class="topic-content" id="content-${idx}">
                                <div class="topic-notes">
                                    <h5>📖 Key Notes</h5>
                                    <div class="notes-text">${topic.notes}</div>
                                </div>
                                <div class="topic-questions">
                                    <h5>❓ Practice Questions</h5>
                                    ${topic.questions.map((q, qIdx) => `
                                        <div class="question-item">
                                            <div class="question-text">Q${qIdx + 1}: ${q.q}</div>
                                            <button class="answer-btn" onclick="toggleAnswer(${idx}-${qIdx})">Show Answer</button>
                                            <div class="answer-text" id="answer-${idx}-${qIdx}"><strong>A:</strong> ${q.a}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        function startTimedExam(courseKey) {
            const course = coursesData[currentCurriculum][courseKey];
            const questions = course.topics.flatMap(t => t.questions);
            timeLeft = 30 * 60; // 30 minutes
            
            const overlay = document.getElementById('quizOverlay');
            overlay.style.display = 'flex';
            
            renderQuizHeader(course.name);
            renderQuizBody(questions);
            
            quizTimer = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                if (timeLeft <= 0) {
                    submitExam(questions);
                }
            }, 1000);
        }

        function renderQuizHeader(title) {
            const content = document.getElementById('quizContent');
            content.innerHTML = `
                <div class="quiz-header">
                    <div>
                        <h2 style="color: #00e5ff;">${title} Mock Exam</h2>
                        <p>Answer all questions. The system will mark your work automatically.</p>
                    </div>
                    <div class="timer-box" id="timer">30:00</div>
                </div>
                <div id="questionList"></div>
                <button class="submit-btn" style="margin-top: 2rem;" onclick="submitExam()">Submit Examination</button>
            `;
        }

        function renderQuizBody(questions) {
            const list = document.getElementById('questionList');
            list.innerHTML = questions.map((q, idx) => `
                <div class="quiz-question-card" id="q-card-${idx}">
                    <h4>Question ${idx + 1}</h4>
                    <p style="font-size: 1.1rem; margin: 1rem 0;">${q.q}</p>
                    <input type="text" class="answer-input" id="ans-${idx}" placeholder="Type your answer here...">
                    <div id="feedback-${idx}"></div>
                </div>
            `).join('');
        }

        function submitExam() {
            clearInterval(quizTimer);
            const course = coursesData[currentCurriculum][selectedCourse];
            const questions = course.topics.flatMap(t => t.questions);
            let score = 0;

            questions.forEach((q, idx) => {
                const studentAns = document.getElementById(`ans-${idx}`).value.trim().toLowerCase();
                const correctAns = q.a.toLowerCase();
                const card = document.getElementById(`q-card-${idx}`);
                const feedback = document.getElementById(`feedback-${idx}`);

                // Simple marking logic - for demo it checks if correct answer string is contained
                if (studentAns !== "" && (correctAns.includes(studentAns) || studentAns.includes(correctAns))) {
                    score++;
                    card.classList.add('feedback-correct');
                    feedback.innerHTML = `<p class="correct-ans-display"><i class="fas fa-check"></i> Correct!</p>`;
                } else {
                    card.classList.add('feedback-wrong');
                    feedback.innerHTML = `
                        <p style="color: #ff4655;"><i class="fas fa-times"></i> Incorrect</p>
                        <p class="correct-ans-display">Correct Answer: ${q.a}</p>
                    `;
                }
                document.getElementById(`ans-${idx}`).disabled = true;
            });

            const percentage = Math.round((score / questions.length) * 100);
            const quizContent = document.getElementById('quizContent');
            
            const resultHtml = `
                <div class="score-card">
                    <h2>Examination Results</h2>
                    <div class="score-val">${percentage}%</div>
                    <p>You scored ${score} out of ${questions.length} questions.</p>
                    <button class="enroll-btn" style="margin-top: 2rem;" onclick="document.getElementById('quizOverlay').style.display='none'">Review Answers or Exit</button>
                </div>
            `;
            quizContent.insertAdjacentHTML('afterbegin', resultHtml);
        }

        function toggleTopic(idx) {
            const content = document.getElementById(`content-${idx}`);
            const toggle = document.getElementById(`toggle-${idx}`);
            content.classList.toggle('show');
            toggle.style.transform = content.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function toggleAnswer(id) {
            document.getElementById(`answer-${id}`).classList.toggle('show');
        }

        function saveToLibrary(title, type) {
            const currentUser = JSON.parse(localStorage.getItem('botswanaminds_currentUser') || localStorage.getItem('solace_currentUser'));
            if (!currentUser) {
                showToast('Please login to save documents to your library', true);
                return;
            }

            const newDoc = {
                id: Date.now(),
                title: title,
                type: type === 'paper' ? 'paper' : 'notes', // Ensure consistency with index.html
                owner: currentUser.username,
                date: new Date().toLocaleDateString()
            };

            let docs = JSON.parse(localStorage.getItem('botswanaminds_user_docs') || '[]');
            if (docs.some(d => d.title === title && d.owner === currentUser.username)) {
                showToast('This document is already in your library');
                return;
            }
            
            docs.push(newDoc);
            localStorage.setItem('botswanaminds_user_docs', JSON.stringify(docs));
            showToast('Saved to your library! Check your dashboard.');
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = isError ? '#ff4655' : '#00e5ff';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}" style="margin-right: 10px;"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function renderCourses() {
            if (selectedCourse) {
                showCourseDetail(selectedCourse);
                return;
            }

            const currData = coursesData[currentCurriculum];
            const courses = Object.keys(currData).map(key => ({
                key,
                ...currData[key]
            }));

            let html = `
                <div class="page-header">
                    <div class="curriculum-badge">🎓 ${currentCurriculum.toUpperCase()} Curriculum</div>
                    <h1>📚 ${currentCurriculum.toUpperCase()} Courses</h1>
                    <p>Access comprehensive courses with topics, notes, and practice questions</p>
                </div>
                <div class="courses-grid">
                    ${courses.map(c => `
                        <div class="course-card" onclick="showCourseDetail('${c.key}')">
                            <div class="course-icon"><i class="fas ${c.icon}"></i></div>
                            <h3>${c.name}</h3>
                            <p>${c.description}</p>
                            <div class="course-meta">
                                <span><i class="fas fa-book-open"></i> ${c.topics.length} Topics</span>
                                <span><i class="fas fa-clipboard-list"></i> ${c.topics.reduce((sum, t) => sum + t.questions.length, 0)} Q&A</span>
                            </div>
                            <button class="enroll-btn" onclick="event.stopPropagation(); showCourseDetail('${c.key}')">View Course →</button>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        // Initialize
        document.querySelectorAll('.curriculum-btn').forEach(btn => {
            if (btn.getAttribute('data-curriculum') === currentCurriculum) btn.classList.add('active');
        });
        const savedUser = localStorage.getItem('botswanaminds_currentUser') || localStorage.getItem('solace_currentUser');
        if (savedUser) {
            const userObj = JSON.parse(savedUser);
            document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user-circle"></i> ${userObj.fullname || userObj.username} <small style="font-size:0.6rem; opacity:0.7">(${userObj.role})</small>`;
        }
        renderCourses();
    </script>
</body>
</html>
